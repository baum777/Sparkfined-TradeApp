app = "sparkfined-backend"
primary_region = "cdg"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  NODE_ENV = "production"
  SERVICE_MODE = "full"
  PORT = "3000"
  BACKEND_PORT = "3000"
  RATE_LIMIT_STORE = "redis"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/api/health"

[[mounts]]
  source = "backend_data"
  destination = "/app/backend/.data"
  initial_size = "5gb"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"
