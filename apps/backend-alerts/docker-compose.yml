services:
  postgres:
    image: postgres:16-alpine
    container_name: sparkfined-alerts-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sparkfined
      POSTGRES_PASSWORD: sparkfined_dev
      POSTGRES_DB: sparkfined_alerts
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
