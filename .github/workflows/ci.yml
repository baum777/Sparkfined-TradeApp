name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'cursor/**'
  pull_request:
    branches:
      - main
      - develop

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint Job - Prüft Code-Qualität
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Check Formatting (Prettier - optional)
        run: |
          if [ -f ".prettierrc" ]; then
            npx prettier --check "src/**/*.{ts,tsx,js,jsx,css,scss,json}"
          else
            echo "Prettier config not found, skipping"
          fi
        continue-on-error: true

  # Verify Job - Runs deterministic acceptance verification
  verify:
    name: Verify (npm run verify)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (root)
        run: npm ci

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Run verify
        run: npm run verify

  # Guardrail: prevent new core endpoints in Vercel api/*
  api-endpoint-guard:
    name: API Endpoint Guard
    runs-on: ubuntu-latest
    needs: [lint, verify]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Vercel /api ownership (no rewrite exceptions)
        run: node scripts/verify-vercel-api-ownership.mjs

      - name: Detect forbidden api/* changes
        run: |
          set -euo pipefail

          # Determine comparison base
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            # For pushes, compare against main (fetched above); fallback to previous commit
            git fetch origin main || true
            BASE_REF=$(git rev-parse origin/main || git rev-parse HEAD^)
          fi

          echo "Comparing changes against ${BASE_REF}"
          CHANGED_FILES=$(git diff --name-only "$BASE_REF"...HEAD || git diff --name-only "$BASE_REF" HEAD)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No changed files detected."
            exit 0
          fi

          echo "$CHANGED_FILES" > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

          # Allowed patterns inside api/*
          ALLOWLIST_REGEX='^api/(wallet/webhook/|alerts/push/|alerts/stream\.ts$|cron/)'

          # Core patterns that must not be added/modified in api/*
          CORE_REGEX='^api/(alerts/|journal/|oracle/|grok-pulse/|reasoning/|chart/|usage/|profile/|meta\.ts$|health\.ts$)'

          # Filter changed files under api/*
          API_CHANGES=$(grep '^api/' /tmp/changed_files.txt || true)

          if [ -z "$API_CHANGES" ]; then
            echo "No api/* changes."
            exit 0
          fi

          # Remove allowlisted paths
          FORBIDDEN=$(echo "$API_CHANGES" | grep -Ev "$ALLOWLIST_REGEX" | grep -E "$CORE_REGEX" || true)

          if [ -z "$FORBIDDEN" ]; then
            echo "api/* changes are within allowlist."
            exit 0
          fi

          echo "❌ Detected forbidden api/* changes:"
          echo "$FORBIDDEN"
          echo
          echo "Core /api endpoints must live in the Node backend (backend/src/routes/*)."
          echo "Please migrate these endpoints to the backend and remove/disable them from api/*."
          exit 1

  # Build Job - Erstellt Production Build
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, verify]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Production
        run: npm run build

      - name: Check Build Size
        run: |
          echo "### Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          du -sh dist/ >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # E2E Tests Job - Führt Playwright Tests aus
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    
    strategy:
      fail-fast: false
      matrix:
        # Teste auf verschiedenen Browsern
        browser: [chromium, firefox]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright Tests
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots-${{ matrix.browser }}
          path: test-results/**/*.png
          retention-days: 7

  # Security Audit - Prüft auf bekannte Vulnerabilities
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for high severity issues
        run: |
          HIGH_VULNS=$(npm audit --json | jq '.metadata.vulnerabilities.high // 0')
          CRITICAL_VULNS=$(npm audit --json | jq '.metadata.vulnerabilities.critical // 0')
          echo "High severity vulnerabilities: $HIGH_VULNS"
          echo "Critical severity vulnerabilities: $CRITICAL_VULNS"
          
          if [ "$CRITICAL_VULNS" -gt 0 ]; then
            echo "❌ Critical vulnerabilities found!"
            exit 1
          elif [ "$HIGH_VULNS" -gt 0 ]; then
            echo "⚠️ High severity vulnerabilities found"
            exit 0
          else
            echo "✅ No critical or high severity vulnerabilities"
          fi
        continue-on-error: true

  # Lighthouse Performance Audit
  lighthouse:
    name: Lighthouse Performance
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Install Dependencies
        run: npm ci

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Run Lighthouse CI
        run: |
          # Starte einen einfachen Server
          npx serve -s dist -p 8080 &
          SERVER_PID=$!
          
          # Warte bis Server bereit ist
          sleep 5
          
          # Führe Lighthouse aus
          lhci autorun --collect.url=http://localhost:8080 || true
          
          # Stoppe Server
          kill $SERVER_PID
        continue-on-error: true

  # Deployment Job (nur für main branch)
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy to Preview Environment
        run: |
          echo "🚀 Preview-Deployment würde hier stattfinden"
          echo "Für echtes Deployment, integriere Vercel, Netlify oder ähnliches"

  # Success Summary
  ci-success:
    name: CI Pipeline Success
    runs-on: ubuntu-latest
    needs: [lint, verify, build, e2e-tests, security-audit]
    if: success()
    
    steps:
      - name: Success Message
        run: |
          echo "### ✅ CI Pipeline erfolgreich durchgelaufen!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Alle Checks haben bestanden:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Linting & Type Check" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Build" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ E2E Tests" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Security Audit" >> $GITHUB_STEP_SUMMARY
