name: Deploy to Vercel

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build for Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Production
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Create Build Info
        run: |
          cat > dist/build-info.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "commit": "${{ github.sha }}",
            "buildDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "branch": "${{ github.ref_name }}"
          }
          EOF

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 30

  deploy-staging:
    name: Deploy to Staging (Preview)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify Vercel Secrets
        run: |
          set -euo pipefail
          [ -n "${{ secrets.VERCEL_TOKEN }}" ] || { echo "Missing VERCEL_TOKEN"; exit 1; }
          [ -n "${{ secrets.VERCEL_ORG_ID }}" ] || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ] || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Deploy Preview
        id: deploy_preview
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          DEPLOY_URL=$(pnpm dlx vercel@latest deploy --yes --token "$VERCEL_TOKEN")
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $DEPLOY_URL"

      - name: Smoke Test Preview
        run: |
          set -euo pipefail
          curl -fsSL "${{ steps.deploy_preview.outputs.deploy_url }}" > /dev/null

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Verify Vercel Secrets
        run: |
          set -euo pipefail
          [ -n "${{ secrets.VERCEL_TOKEN }}" ] || { echo "Missing VERCEL_TOKEN"; exit 1; }
          [ -n "${{ secrets.VERCEL_ORG_ID }}" ] || { echo "Missing VERCEL_ORG_ID"; exit 1; }
          [ -n "${{ secrets.VERCEL_PROJECT_ID }}" ] || { echo "Missing VERCEL_PROJECT_ID"; exit 1; }

      - name: Deploy Production
        id: deploy_prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          set -euo pipefail
          DEPLOY_URL=$(pnpm dlx vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN")
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $DEPLOY_URL"

      - name: Smoke Test Production
        run: |
          set -euo pipefail
          curl -fsSL "${{ steps.deploy_prod.outputs.deploy_url }}" > /dev/null

